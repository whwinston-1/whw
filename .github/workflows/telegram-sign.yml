name: Telegram Daily Sign (User Account)

on:
  schedule:
    # UTC 00:00 = Asia/Shanghai 08:00
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send sign message
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          TG_TARGET: ${{ secrets.TG_TARGET }}
          TG_SIGN_TEXT: ${{ secrets.TG_SIGN_TEXT }}
        run: python send_sign.py
